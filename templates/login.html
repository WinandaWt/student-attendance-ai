<!DOCTYPE html>
<html>

<head>
    <title>AI Attendance System Academic</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/journal-theme.css') }}" rel="stylesheet">
</head>

<body class="journal-body">

<div class="journal-shell container py-5">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card journal-card p-4">

                <div class="journal-pill mx-auto mb-3">Secure Access</div>
                <h3 class="journal-page-title text-center">
                    AI Attendance System Academic
                </h3>
                <p class="journal-subtitle text-center mx-auto mb-4">
                    Administrative access for attendance monitoring and academic prediction.
                </p>

                <div class="journal-soft-divider"></div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}" role="alert">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="post" action="{{ url_for('login') }}">

                    <input
                        type="text"
                        class="form-control journal-input mb-3"
                        name="username"
                        value="{{ request.form.get('username', '') }}"
                        placeholder="Username">

                    <select
                        class="form-select journal-select mb-3"
                        name="role"
                        required>

                        <option value="" {% if not request.form.get('role') %}selected{% endif %}>
                            Pilih Role
                        </option>

                        <option value="admin" {% if request.form.get('role') == 'admin' %}selected{% endif %}>
                            Admin
                        </option>

                        <option value="student" {% if request.form.get('role') == 'student' %}selected{% endif %}>
                            Student
                        </option>

                    </select>

                    <input
                        type="password"
                        class="form-control journal-input mb-3"
                        name="password"
                        placeholder="Password">

                    <button
                        type="submit"
                        class="btn btn-primary w-100 journal-btn-primary journal-navbar-btn">

                        Login

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
